# Jekyll configuration for the XiDOS documentation site.
#
# GitHub Pages builds this folder natively (Settings -> Pages -> Source:
# "Deploy from a branch", branch: main, folder: /docs). No Actions workflow
# is needed for the docs themselves.

title: XiDOS
description: A POSIX compatibility layer for MS-DOS / FreeDOS — Cygwin, but for DOS.
theme: jekyll-theme-cayman

# Link to the source repo from the Cayman header buttons.
show_downloads: false

# So in-repo Markdown links like architecture.md resolve to the built pages.
# (jekyll-relative-links is enabled by default on GitHub Pages.)
plugins:
  - jekyll-relative-links

# Don't try to serve project plumbing as pages.
exclude:
  - BUILDING.md.bak
