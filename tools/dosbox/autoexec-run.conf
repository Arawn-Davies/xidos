# autoexec-run.conf - automated (non-interactive) DOSBox run for XiDOS.
#
# Pair this with dosbox-xidos.conf. It mounts the build output directory as
# C:, runs the smoke test with its stdout redirected to OUT.TXT, then exits
# DOSBox. The host side (`make dos`) reads C:\OUT.TXT back afterwards, so the
# whole edit -> build -> run -> capture loop needs no manual interaction.
#
# This is the "run" half of the loop; autoexec-debug.conf is the interactive
# half.

[autoexec]
@echo off
mount c .
c:
SMOKE.EXE > OUT.TXT
exit
