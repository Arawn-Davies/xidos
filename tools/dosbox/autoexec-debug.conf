# autoexec-debug.conf - interactive DOSBox shell for poking at XiDOS builds.
#
# Pair this with dosbox-xidos.conf. It mounts the current directory as C:
# (run DOSBox from build/dos, or use `make dos-debug` which cd's for you),
# then drops you at a prompt instead of exiting - so you can run SMOKE.EXE,
# inspect files, and re-run by hand. This is the "debug" half of the loop.

[autoexec]
@echo off
mount c .
c:
cls
echo =====================================================
echo   XiDOS - DOSBox debug shell
echo.
echo   C: is mounted to the build output directory.
echo   Try:   SMOKE.EXE      (run the XiDOS smoke test)
echo          dir            (see what was built)
echo          exit           (quit DOSBox)
echo =====================================================
echo.
dir /w
