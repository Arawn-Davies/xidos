# dosbox-xidos.conf - DOSBox settings for testing XiDOS.
#
# This file carries only machine/CPU/video settings. The [autoexec] section
# is intentionally empty here; the run harness supplies one via a SECOND
# -conf file (autoexec-debug.conf for an interactive shell, or a generated
# _run.conf for the automated build-run-capture loop). DOSBox merges multiple
# -conf files, with later files overriding earlier keys.
#
# Manual use:
#   cd build/dos
#   /Applications/dosbox.app/Contents/MacOS/DOSBox \
#       -conf ../../tools/dosbox/dosbox-xidos.conf \
#       -conf ../../tools/dosbox/autoexec-debug.conf
#
# Easier: `make dos` (automated) or `make dos-debug` (interactive shell).

[sdl]
fullscreen=false
output=surface
# Don't grab the mouse/keyboard for a text-only dev workload.
autolock=false

[dosbox]
# Plenty of machine for a text-mode test; bump memsize for the future
# pmode/DJGPP workloads (bash/GCC need real RAM).
machine=svga_s3
memsize=16

[cpu]
# Fast as possible for a quick edit-run loop; the automated runner can
# override cycles via CYCLES=... if a program is timing-sensitive.
core=auto
cputype=auto
cycles=max

[autoexec]
# Intentionally empty - provided by a second -conf file.
